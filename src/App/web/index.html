<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>GroupWeaver Graph</title>
  <style>
    /* ADR-026 WP1b: the chrome (body/#cy bg, #legend + #controls surfaces, text, swatch
       fills) is driven by CSS custom properties. The :root DEFAULTS below are the DARK
       values, byte-identical to the pre-WP1b literals, so the bundle renders identically
       before any theme command and the ui-verifier dark screenshots stay unchanged.
       the bundle script's `theme` handler overrides these via documentElement.style.setProperty
       from its CHROME table (the single source of truth, hand-mirrored per ADR-021). The
       kind swatch SVG fills are theme-INVARIANT and stay hardcoded in the markup; the
       severity/diff swatch fills bind to --gw-sev-*/--gw-diff-* so the legend stays
       truthful in light mode (mirrors the themed canvas hues). */
    :root {
      --gw-canvas-bg: #1b1f27;
      /* Redesign-fidelity (#168): the decorative Fluent dot-grid tint on the graph stage.
         DARK default (a faint light dot); the theme handler overrides it to the light value
         from the bundle script's CHROME table. Values verbatim from the design mock (frames
         1 & 4). Purely decorative texture behind the cytoscape canvas (1.4.11 N/A). */
      --gw-canvas-grid: rgba(255, 255, 255, 0.04);
      --gw-chrome-bg: rgba(22, 26, 33, 0.92);
      --gw-chrome-border: rgba(255, 255, 255, 0.06);
      --gw-chrome-shadow: 0 4px 16px rgba(0, 0, 0, 0.35);
      --gw-chrome-title: #8A93A3;
      --gw-chrome-label: #E8ECF2;
      --gw-chrome-count: #C8CFDB;
      /* #268 graph-4: retuned from #5A6171 (~2.80:1) to clear WCAG 1.4.3 4.5:1 against the
         composited #legend surface (4.92:1); mirror of CHROME.dark['--gw-chrome-count-zero']. */
      --gw-chrome-count-zero: #828992;
      --gw-chrome-edge-text: #A6AEBC;
      --gw-input-bg: rgba(0, 0, 0, 0.25);
      /* #268 graph-3: retuned from 0.12 (~1.43:1) to clear WCAG 1.4.11 3:1 against the
         composited #controls surface (3.33:1); mirror of CHROME.dark border tokens. */
      --gw-input-border: rgba(255, 255, 255, 0.36);
      --gw-btn-bg: rgba(255, 255, 255, 0.06);
      --gw-btn-border: rgba(255, 255, 255, 0.36);
      --gw-btn-hover-bg: rgba(255, 255, 255, 0.12);
      --gw-focus-ring: #4FA3E3;
      --gw-no-match: #F7A30B;
      --gw-edge-member: #8E9BB4;
      --gw-edge-contains: #6B788F;
      --gw-sev-error: #D13438;
      --gw-sev-warning: #F7A30B;
      --gw-sev-info: #4FA3E3;
      --gw-sev-info-ink: #1b1f27;
      --gw-diff-added: #2FAE4E;
      --gw-diff-removed: #E0503A;
      --gw-diff-unchecked: #8A8F98;
      /* ADR-027 D4 (WP3): the selection accent ring hue (DARK default; flips to
         #6A5CFF on a {variant:'light'} command via CHROME.light). Mirror of
         BrandTokens.GraphAccentHex / the bundle script's THEME.dark.accent. */
      --gw-accent: #8B7BFF;
    }
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: var(--gw-canvas-bg); }
    /* The graph stage carries the decorative dot-grid (#168): a viewport-static radial-gradient
       texture (24px pitch) painted on #cy BENEATH cytoscape's transparent canvas, so the dots
       show through behind nodes/edges without panning with the graph (matches the mock's static
       stage texture). The solid canvas colour comes from body's --gw-canvas-bg below it. */
    #cy {
      width: 100%; height: 100%;
      background-image: radial-gradient(var(--gw-canvas-grid) 1px, transparent 1px);
      background-size: 24px 24px;
    }
    #legend {
      position: fixed; top: 12px; left: 12px; z-index: 10;
      pointer-events: none;
      background: var(--gw-chrome-bg);
      border: 1px solid var(--gw-chrome-border);
      border-radius: 8px;
      box-shadow: var(--gw-chrome-shadow);
      padding: 14px 16px; width: 232px;
      max-height: calc(100vh - 24px); overflow-y: auto;
      font-family: "Segoe UI", sans-serif;
    }
    #legend .legend-section-title {
      font-size: 10px; font-weight: 600; letter-spacing: 0.08em;
      text-transform: uppercase; color: var(--gw-chrome-title); margin-bottom: 6px;
    }
    #legend .legend-section + .legend-section { margin-top: 14px; }
    #legend .legend-kinds {
      display: grid; grid-template-columns: 16px 1fr auto;
      column-gap: 10px; row-gap: 3px; align-items: center;
    }
    #legend .kind-label { font-size: 12px; line-height: 1.4; font-weight: 400; color: var(--gw-chrome-label); }
    #legend svg { display: block; }
    #legend .count {
      font-size: 12px; font-family: "Cascadia Mono", "Consolas", monospace;
      font-variant-numeric: tabular-nums; font-weight: 500;
      color: var(--gw-chrome-count); text-align: right;
    }
    #legend .count.zero { color: var(--gw-chrome-count-zero); }
    #legend .legend-strip { display: flex; flex-wrap: wrap; gap: 10px 12px; align-items: center; }
    #legend .legend-strip span {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 12px; color: var(--gw-chrome-label);
    }
    /* Severity/diff swatch fills mirror the themed canvas hues (ADR-026 D5). */
    #legend [data-sev="error"] svg rect { fill: var(--gw-sev-error); }
    #legend [data-sev="warning"] svg polygon { fill: var(--gw-sev-warning); }
    #legend [data-sev="info"] svg circle { fill: var(--gw-sev-info); }
    #legend [data-sev="info"] svg rect { fill: var(--gw-sev-info-ink); }
    #legend [data-diff="added"] svg circle { stroke: var(--gw-diff-added); }
    #legend [data-diff="added"] svg line { stroke: var(--gw-diff-added); }
    #legend [data-diff="removed"] svg circle { fill: var(--gw-diff-removed); stroke: var(--gw-diff-removed); }
    #legend [data-diff="removed"] svg line { stroke: var(--gw-diff-removed); }
    #legend [data-diff="unchecked"] svg circle { stroke: var(--gw-diff-unchecked); }
    #legend [data-diff="unchecked"] svg line { stroke: var(--gw-diff-unchecked); }
    #legend .legend-edges {
      border-top: 1px solid var(--gw-chrome-border);
      margin-top: 14px; padding-top: 8px;
      display: flex; flex-direction: column; gap: 3px;
    }
    #legend .legend-edges div {
      display: flex; align-items: center; gap: 6px;
      font-size: 11px; color: var(--gw-chrome-edge-text);
    }
    #legend .edge-sample {
      display: inline-block; width: 24px;
      vertical-align: middle; border-top: 2px solid var(--gw-edge-member);
    }
    #legend .edge-sample.contains { border-top: 2px dashed var(--gw-edge-contains); }
    #legend .edge-arrow { color: var(--gw-edge-member); margin: 0 -2px 0 -6px; line-height: 1; }
    /* Quiet double-click-to-expand gesture hint under the edge legend. Uses the edge-row
       ink (WCAG 1.4.3: it carries unique prose, so it must clear 4.5:1 - the count-zero
       token does not); the 10px italic keeps it subordinate to the edge rows. Inherits
       #legend's pointer-events:none (never intercepts a gesture). */
    #legend .legend-hint {
      margin-top: 8px; font-size: 10px; line-height: 1.4;
      color: var(--gw-chrome-edge-text); font-style: italic;
    }
    /* ADR-023: the first INTERACTIVE bundle overlay (legend is pointer-events:none).
       Same neutral chrome as #legend; quiet/utilitarian. pointer-events scoped to
       this box so graph pan/tap below stays unaffected. */
    #controls {
      position: fixed; right: 12px; bottom: 12px; z-index: 10;
      pointer-events: auto;
      background: var(--gw-chrome-bg);
      border: 1px solid var(--gw-chrome-border);
      border-radius: 8px;
      box-shadow: var(--gw-chrome-shadow);
      padding: 8px 10px;
      font-family: "Segoe UI", sans-serif;
      display: flex; flex-direction: column; gap: 6px;
      max-width: 232px;
    }
    #controls .controls-row { display: flex; gap: 6px; align-items: center; }
    #controls input[type="text"] {
      flex: 1 1 auto; min-width: 0;
      background: var(--gw-input-bg);
      border: 1px solid var(--gw-input-border);
      border-radius: 5px;
      padding: 4px 7px;
      font-family: "Segoe UI", sans-serif; font-size: 12px;
      color: var(--gw-chrome-label);
    }
    #controls input[type="text"]::placeholder { color: var(--gw-chrome-title); }
    #controls button {
      background: var(--gw-btn-bg);
      border: 1px solid var(--gw-btn-border);
      border-radius: 5px;
      padding: 4px 8px;
      font-family: "Segoe UI", sans-serif; font-size: 12px;
      color: var(--gw-chrome-label);
      cursor: pointer; line-height: 1.2;
    }
    #controls button:hover { background: var(--gw-btn-hover-bg); }
    #controls button:focus-visible,
    #controls input[type="text"]:focus-visible {
      outline: 2px solid var(--gw-focus-ring); outline-offset: 1px;
    }
    #controls .zoom-btn { font-family: "Cascadia Mono", "Consolas", monospace; min-width: 26px; }
    #controls .no-match {
      font-size: 11px; color: var(--gw-no-match); padding: 0 1px;
    }
    #controls .no-match[hidden] { display: none; }
    /* ADR-035 D3: the visually-hidden aria-live status region. Standard sr-only clip
       (off-screen, 1x1, clipped) so it is present in the AT tree but never painted or
       affecting layout. The bundle script writes its text on "No match"/"No issues". */
    #gw-status {
      position: fixed; width: 1px; height: 1px; overflow: hidden;
      clip: rect(0 0 0 0); clip-path: inset(50%); white-space: nowrap;
    }
    /* WP3c (#144): the Ctrl+K command-palette results dropdown. Lives under
       #find-input inside #controls, themed from the same --gw-* chrome vars (no new
       token). Hidden by default via the [hidden] attribute (display:none) so the
       closed/unfiltered state stays byte-identical to the pre-WP3c bundle. */
    #palette-results {
      list-style: none; margin: 0; padding: 2px;
      max-height: 232px; overflow-y: auto;
      border: 1px solid var(--gw-chrome-border);
      border-radius: 5px;
      background: var(--gw-input-bg);
    }
    #palette-results[hidden] { display: none; }
    #palette-results .palette-item {
      display: flex; flex-direction: column; gap: 1px;
      padding: 4px 7px; border-radius: 4px; cursor: pointer;
    }
    #palette-results .palette-item:hover { background: var(--gw-btn-hover-bg); }
    /* Highlighted (keyboard-navigated) item: a quiet accent tint + accent left edge,
       reusing --gw-accent. The white/dark selection border stays cytoscape's job. */
    #palette-results .palette-item.gw-active {
      background: var(--gw-btn-hover-bg);
      box-shadow: inset 2px 0 0 0 var(--gw-accent);
    }
    /* WP3c (#144): the active row's --gw-btn-hover-bg tint lifts the background under
       the otherwise-dim hint (--gw-chrome-title) below the 4.5:1 WCAG 1.4.3 text floor
       (4.27:1 dark / 4.43:1 light on the composited active-row bg). Bump ONLY the
       active-row hint to the brighter --gw-chrome-count, which clears the floor with
       margin (8.44:1 dark / 7.38:1 light); non-active hints already pass and stay dim. */
    #palette-results .palette-item.gw-active .palette-hint { color: var(--gw-chrome-count); }
    #palette-results .palette-label {
      font-size: 12px; color: var(--gw-chrome-label);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    #palette-results .palette-hint {
      font-size: 10px; color: var(--gw-chrome-title);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    /* ADR-027 D3/D4 (WP3): the selection accent halo/pulse. ONE absolutely-positioned
       ring element (the bundle script positions it at the selected node's renderedPosition and
       sizes it to the node + glow margin), drawn ABOVE the canvas (z-index 5, below the
       #legend/#controls chrome at z 10) and ON TOP of the node:selected white border.
       pointer-events:none so graph pan/tap below stays unaffected. The glow is a
       3px accent ring + a soft accent box-shadow halo; opacity 0.9 reads the brand
       purple clearly on BOTH the dark #1b1f27 and light #F5F6F8 canvases (decorative
       non-text object, redundant with the white selection border — ADR-027 D4). Hidden
       by default (the [hidden] attribute); the bundle script toggles it on select/clear. */
    #gw-accent-ring {
      position: fixed; z-index: 5;
      pointer-events: none;
      box-sizing: border-box;
      border-radius: 50%;
      border: 3px solid var(--gw-accent);
      box-shadow: 0 0 12px 3px var(--gw-accent);
      opacity: 0.9;
    }
    #gw-accent-ring[hidden] { display: none; }
    /* The gentle pulse (ADR-027 D3). The bundle script adds .gw-accent-pulse ONLY when motion
       is allowed; under prefers-reduced-motion:reduce it leaves the class off => a
       STATIC ring (ADR-017). The @media guard is belt-and-braces so the keyframe never
       animates even if the class were present under reduced motion. */
    @keyframes gw-accent-pulse {
      0%, 100% { transform: scale(1); opacity: 0.9; }
      50% { transform: scale(1.08); opacity: 0.6; }
    }
    #gw-accent-ring.gw-accent-pulse {
      transform-origin: center center;
      animation: gw-accent-pulse 1.8s ease-in-out infinite;
    }
    @media (prefers-reduced-motion: reduce) {
      #gw-accent-ring.gw-accent-pulse { animation: none; }
    }
    /* WP3d (#146): the graph minimap. Bottom-LEFT (legend owns top-left, #controls
       bottom-right). A downscaled thumbnail of the WHOLE graph (a cy.png snapshot set
       as background-image by the bundle script, refreshed only on graph/theme change)
       plus a live viewport rectangle (#minimap-viewport, the only per-frame DOM write).
       INTERACTIVE (click/drag-to-pan), so pointer-events:auto is scoped to this box —
       like #controls — leaving graph pan/tap below unaffected. Chrome from the same
       --gw-* vars (themes for free). Hidden by default ([hidden]) and on an empty graph
       so a broken/empty thumbnail never shows; the bundle script toggles it. */
    #minimap {
      position: fixed; left: 12px; bottom: 12px; z-index: 10;
      pointer-events: auto;
      width: 200px; height: 140px;
      background-color: var(--gw-canvas-bg);
      background-repeat: no-repeat;
      background-position: center center;
      background-size: contain;
      border: 1px solid var(--gw-chrome-border);
      border-radius: 8px;
      box-shadow: var(--gw-chrome-shadow);
      overflow: hidden;
      cursor: crosshair;
    }
    #minimap[hidden] { display: none; }
    /* The live viewport rectangle: a single positioned div the bundle script moves on
       every render/pan/zoom (one element — software-rendering-floor safe, like the
       accent ring). Accent-tinted outline so it reads on both themes. */
    #minimap-viewport {
      position: absolute; top: 0; left: 0; width: 0; height: 0;
      box-sizing: border-box;
      border: 1.5px solid var(--gw-accent);
      /* theme-honest fill: derive from --gw-accent so light (#6A5CFF) and dark
         (#8B7BFF) match their own border rather than a hardcoded dark hue. */
      background: color-mix(in srgb, var(--gw-accent) 12%, transparent);
      border-radius: 2px;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="cy"></div>
  <!-- ADR-027 D3 (WP3): the single selection accent halo/pulse ring. Positioned +
       sized + shown/hidden by the bundle script (one element, software-rendering-floor
       safe). Hidden until a node is selected. -->
  <div id="gw-accent-ring" hidden></div>
  <div id="legend">
    <div class="legend-section">
      <div class="legend-section-title">Kinds</div>
      <div class="legend-kinds">
        <span data-kind="User" style="display: contents;">
          <svg width="16" height="16" viewBox="0 0 16 16"><circle cx="8" cy="8" r="5" fill="#038387" stroke="rgba(255,255,255,0.25)" stroke-width="1" /></svg>
          <span class="kind-label">User</span>
          <span class="count">0</span>
        </span>
        <span data-kind="GlobalGroup" style="display: contents;">
          <svg width="16" height="16" viewBox="0 0 16 16"><polygon points="8,2 14,13 2,13" fill="#107C10" stroke="rgba(255,255,255,0.25)" stroke-width="1" /></svg>
          <span class="kind-label">Global group</span>
          <span class="count">0</span>
        </span>
        <span data-kind="DomainLocalGroup" style="display: contents;">
          <!-- stroke #8A93A3 w1.5 mirrors the canvas WCAG 1.4.11 border-lift (#90/ADR-021). -->
          <svg width="16" height="16" viewBox="0 0 16 16"><polygon points="8,2 14,8 8,14 2,8" fill="#A14000" stroke="#8A93A3" stroke-width="1.5" /></svg>
          <span class="kind-label">Domain-local group</span>
          <span class="count">0</span>
        </span>
        <span data-kind="UniversalGroup" style="display: contents;">
          <!-- stroke #8A93A3 w1.5 mirrors the canvas WCAG 1.4.11 border-lift (#90/ADR-021). -->
          <svg width="16" height="16" viewBox="0 0 16 16"><polygon points="8,2 14,6.5 11.6,14 4.4,14 2,6.5" fill="#744DA9" stroke="#8A93A3" stroke-width="1.5" /></svg>
          <span class="kind-label">Universal group</span>
          <span class="count">0</span>
        </span>
        <span data-kind="OrganizationalUnit" style="display: contents;">
          <svg width="16" height="16" viewBox="0 0 16 16"><rect x="3" y="3" width="10" height="10" rx="2" fill="#0F6CBD" stroke="rgba(255,255,255,0.25)" stroke-width="1" /></svg>
          <span class="kind-label">Org. unit</span>
          <span class="count">0</span>
        </span>
        <span data-kind="Computer" style="display: contents;">
          <!-- stroke #8A93A3 w1.5 mirrors the canvas WCAG 1.4.11 border-lift (#90/ADR-021). -->
          <svg width="16" height="16" viewBox="0 0 16 16"><rect x="3" y="3" width="10" height="10" fill="#556070" stroke="#8A93A3" stroke-width="1.5" /></svg>
          <span class="kind-label">Computer</span>
          <span class="count">0</span>
        </span>
        <span data-kind="External" style="display: contents;">
          <svg width="16" height="16" viewBox="0 0 16 16"><circle cx="8" cy="8" r="5" fill="#757575" stroke="#B0B6BF" stroke-width="1.5" stroke-dasharray="2 2" /></svg>
          <span class="kind-label">External</span>
          <span class="count">0</span>
        </span>
      </div>
    </div>
    <div class="legend-section">
      <div class="legend-section-title">Severity</div>
      <div class="legend-strip">
        <span data-sev="error"><svg width="12" height="12" viewBox="0 0 12 12"><rect x="1" y="1" width="10" height="10" fill="#D13438" /></svg>Error</span>
        <span data-sev="warning"><svg width="12" height="12" viewBox="0 0 12 12"><polygon points="6,1 11,11 1,11" fill="#F7A30B" /></svg>Warning</span>
        <span data-sev="info"><svg width="12" height="12" viewBox="0 0 12 12"><circle cx="6" cy="6" r="5" fill="#4FA3E3" /><rect x="5.3" y="5" width="1.4" height="4" fill="#1b1f27" /><rect x="5.3" y="2.8" width="1.4" height="1.4" fill="#1b1f27" /></svg>Info</span>
      </div>
    </div>
    <div class="legend-section">
      <div class="legend-section-title">Diff</div>
      <div class="legend-strip">
        <span data-diff="added"><svg width="22" height="12" viewBox="0 0 22 12"><circle cx="6" cy="6" r="4" fill="none" stroke="#2FAE4E" stroke-width="1.5" /><line x1="12" y1="6" x2="21" y2="6" stroke="#2FAE4E" stroke-width="1.5" /></svg>Added</span>
        <span data-diff="removed"><svg width="22" height="12" viewBox="0 0 22 12"><circle cx="6" cy="6" r="4" fill="#E0503A" fill-opacity="0.45" stroke="#E0503A" stroke-width="1.5" /><line x1="12" y1="6" x2="21" y2="6" stroke="#E0503A" stroke-width="1.5" stroke-dasharray="3 2" /></svg>Removed</span>
        <span data-diff="unchecked"><svg width="22" height="12" viewBox="0 0 22 12"><circle cx="6" cy="6" r="4" fill="none" stroke="#8A8F98" stroke-width="1.5" /><line x1="12" y1="6" x2="21" y2="6" stroke="#8A8F98" stroke-width="1.5" stroke-dasharray="1 2" /></svg>Unck</span>
      </div>
    </div>
    <div class="legend-edges">
      <div><span class="edge-sample"></span><span class="edge-arrow">&rarr;</span>is member of</div>
      <div><span class="edge-sample contains"></span>contains</div>
    </div>
    <!-- Quiet gesture hint: External/frontier nodes are unexpanded — double-click one to
         load its members (the dbltap -> nodeExpand path). Decorative; #legend is
         pointer-events:none so this never intercepts a graph gesture. -->
    <div class="legend-hint">Double-click an External node to expand it.</div>
  </div>
  <!-- WP3d (#146): the graph minimap. Thumbnail bg + live viewport rect are set by the
       bundle script (one cy.png on graph/theme change; the rect is the only per-frame
       update). Hidden until a non-empty graph renders. Click/drag pans the main view. -->
  <div id="minimap" hidden>
    <div id="minimap-viewport"></div>
  </div>
  <!-- ADR-023: interactive control cluster (find + camera + label gate override). -->
  <div id="controls">
    <div class="controls-row">
      <input id="find-input" type="text" placeholder="Search &amp; commands&hellip; Ctrl K"
             aria-label="Search nodes and commands" autocomplete="off" spellcheck="false"
             role="combobox" aria-expanded="false" aria-controls="palette-results" />
    </div>
    <!-- WP3c (#144): command-palette results. Populated/shown/hidden by the bundle
         script; hidden until the palette is open with results. -->
    <ul id="palette-results" role="listbox" aria-label="Search results and commands" hidden></ul>
    <div id="find-no-match" class="no-match" hidden>No match</div>
    <div class="controls-row">
      <button id="fit-btn" type="button" title="Fit graph to view (Ctrl+0)">Fit</button>
      <button id="zoom-in-btn" class="zoom-btn" type="button" title="Zoom in (+)" aria-label="Zoom in">+</button>
      <button id="zoom-out-btn" class="zoom-btn" type="button" title="Zoom out (-)" aria-label="Zoom out">&minus;</button>
      <button id="labels-btn" type="button" aria-pressed="false"
              title="Toggle label visibility at fit zoom">Labels: auto</button>
      <button id="issues-btn" type="button" aria-pressed="false"
              title="Show only flagged nodes and their loaded ancestors; selecting a hidden node clears the filter">Issues only</button>
    </div>
  </div>
  <!-- ADR-035 D3: the polite aria-live status region (parallel AT channel for the
       "No match" and "No issues" states). Visually hidden via the sr-only clip rule
       above; the bundle script writes its text content. role=status implies polite. -->
  <div id="gw-status" role="status" aria-live="polite"></div>
  <!-- cytoscape 3.34.0, vendored - byte-identical to spikes/GraphSpike/web/vendor (pinned by WebBundleTests). -->
  <script src="vendor/cytoscape.min.js"></script>
  <script src="bridge.js"></script>
  <script src="graph.js"></script>
</body>
</html>
