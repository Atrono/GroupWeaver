name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    # Pinned (issue #32): windows-latest redirects to windows-2025-vs2026 from
    # 2026-06-15. windows-2022 matches the Server-2022 dev box (RequiresAd tests
    # run there); adopt a newer image deliberately, with the graph-bundle gate
    # (Playwright/Chromium) and .NET 8 SDK verified - never via silent redirect.
    runs-on: windows-2022
    # Defense in depth vs the 360-minute GitHub default: a hung step once
    # burned 3 h of runner time before manual cancellation (run 27409858814).
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10   # v6.0.3

      - name: Setup .NET 8
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2   # v5.3.0
        with:
          global-json-file: global.json

      # The `dotnet format` "Unable to locate dotnet CLI" flake is an upstream race in
      # dotnet-format's own CLI probe (dotnet/format#2000; still seen on 8.x per
      # dotnet/sdk#44957). Env pinning alone did not cure it (#110 -> #232):
      # tools/build.ps1 pins DOTNET_HOST_PATH/DOTNET_ROOT AND retries the format step
      # once on the exact failure signature (exit 4 + that message), so the shared
      # gate needs no separate CI step.
      - name: Cache NuGet packages
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae   # v5.0.5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', 'Directory.Build.props', '**/packages.lock.json', '.config/dotnet-tools.json') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      # CI reuses the local gate; Category=RequiresAd tests are excluded by design.
      # -Coverage feeds the floor check below (#311 item 12).
      - name: Build gate
        run: pwsh tools/build.ps1 -SkipAdTests -Coverage

      # Line-coverage floor over the three product assemblies: 83% = two points
      # under the measured CI-equivalent baseline (85.1%; the full local suite
      # incl. live-AD measures 90.2%). Raise deliberately, never lower to make a
      # build green.
      - name: Coverage floor
        run: pwsh tools/coverage-report.ps1 -MinLine 83

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a   # v7.0.1
        with:
          name: coverage
          path: artifacts/coverage/report
          retention-days: 7

      # Check-only correctness lint for the hand-authored web bundle (#301 item 8).
      # Never mutates: the "web bundle survives publish" step below hash-compares
      # the published bundle against these exact source bytes.
      - name: Web bundle lint
        timeout-minutes: 5
        run: pwsh tools/lint-web.ps1

      # Process-level CLI probe matrix (ADR-038 / WP3, issue #242): runs the REAL
      # built exe through --check --demo (pinned stdout), the watchdogged bare
      # --check (the launch-smoke-hang regression guard: bare --check once hit live
      # LDAP on a DC-less runner and hung 44 min), the --dump-graph demo-only
      # refusal (exit 64), and the dump-twice byte-identity pin. Reuses the build
      # gate's Release build; the script kill-on-timeouts every child itself.
      # timeout-minutes deliberately exceeds the script's worst-case watchdog sum
      # (480 s) so the script always gets to print its own failure summary before
      # the runner would kill the step.
      - name: CLI matrix gate
        timeout-minutes: 10
        run: pwsh tools/test-cli-matrix.ps1

      - name: Cache Playwright browsers
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae   # v5.0.5
        with:
          path: ~\AppData\Local\ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('tests/graph-bundle/package-lock.json') }}

      # Verifies the literal shipped web bundle against the literal GraphBuilder
      # output (ADR-004 Consequences) - same gate as locally. timeout-minutes
      # plus verify.mjs's own 5-min watchdog: a renderer stall can no longer
      # hang the job silently (incident: run 27409858814).
      - name: Graph bundle verification
        timeout-minutes: 12
        run: pwsh tools/test-graph-bundle.ps1

      - name: Upload graph screenshots
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a   # v7.0.1
        with:
          name: graph-ui
          path: artifacts/ui/graph-*.png
          retention-days: 7

      - name: Publish win-x64 (self-contained, single file)
        run: dotnet publish src/App -c Release -r win-x64 --self-contained -p:PublishSingleFile=true -o artifacts/publish/win-x64

      # The web bundle must survive single-file publish as LOOSE files next to the
      # exe (ExcludeFromSingleFile, ADR-004 D6) - a silent drop would only surface
      # at app runtime.
      - name: Verify web bundle survives publish
        run: |
          $web = 'artifacts/publish/win-x64/web'
          foreach ($f in 'index.html', 'bridge.js', 'graph.js', 'vendor/cytoscape.min.js') {
            if (-not (Test-Path (Join-Path $web $f))) {
              Write-Host "MISSING from publish output: $web/$f"
              exit 1
            }
          }
          # Strongest possible integrity check: every published bundle file must be
          # byte-identical to its vendored source in the checkout (no magic-number
          # size floor - cytoscape.min.js 3.34.0 is ~425 KB and failed a 500KB one).
          foreach ($f in 'index.html', 'bridge.js', 'graph.js', 'vendor/cytoscape.min.js') {
            $published = (Get-FileHash (Join-Path $web $f) -Algorithm SHA256).Hash
            $source = (Get-FileHash (Join-Path 'src/App/web' $f) -Algorithm SHA256).Hash
            if ($published -ne $source) {
              Write-Host "CORRUPTED in publish output: $web/$f (hash $published != source $source)"
              exit 1
            }
          }
          Write-Host "web bundle intact: all 4 files byte-identical to src/App/web."

      - name: Upload release artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a   # v7.0.1
        with:
          name: groupweaver-win-x64
          path: artifacts/publish/win-x64
          retention-days: 7
