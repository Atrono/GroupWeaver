name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    # Pinned (issue #32): windows-latest redirects to windows-2025-vs2026 from
    # 2026-06-15. windows-2022 matches the Server-2022 dev box (RequiresAd tests
    # run there); adopt a newer image deliberately, with the graph-bundle gate
    # (Playwright/Chromium) and .NET 8 SDK verified - never via silent redirect.
    runs-on: windows-2022
    # Defense in depth vs the 360-minute GitHub default: a hung step once
    # burned 3 h of runner time before manual cancellation (run 27409858814).
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10   # v6.0.3

      - name: Setup .NET 8
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2   # v5.3.0
        with:
          global-json-file: global.json

      # `dotnet format` resolves the SDK via DOTNET_ROOT, not just the PATH muxer that
      # invoked it; on the windows-2022 runner that env var is intermittently unset after
      # setup-dotnet, so the format step inside the Build gate flakes with "Unable to
      # locate dotnet CLI" (e.g. run 27958292551, cured only by a rerun). Pin DOTNET_ROOT
      # to the resolved dotnet install dir so every later step's format probe finds the
      # CLI deterministically. Derived (not hardcoded) so it tracks wherever setup-dotnet
      # placed the muxer; exported via GITHUB_ENV to all subsequent steps.
      - name: Pin DOTNET_ROOT (dotnet format CLI-resolution flake)
        shell: pwsh
        run: |
          $root = Split-Path (Get-Command dotnet).Source -Parent
          "DOTNET_ROOT=$root" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          Write-Host "DOTNET_ROOT pinned to $root"

      - name: Cache NuGet packages
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae   # v5.0.5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', 'Directory.Build.props') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      # CI reuses the local gate; Category=RequiresAd tests are excluded by design.
      - name: Build gate
        run: pwsh tools/build.ps1 -SkipAdTests

      - name: Cache Playwright browsers
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae   # v5.0.5
        with:
          path: ~\AppData\Local\ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('tests/graph-bundle/package-lock.json') }}

      # Verifies the literal shipped web bundle against the literal GraphBuilder
      # output (ADR-004 Consequences) - same gate as locally. timeout-minutes
      # plus verify.mjs's own 5-min watchdog: a renderer stall can no longer
      # hang the job silently (incident: run 27409858814).
      - name: Graph bundle verification
        timeout-minutes: 12
        run: pwsh tools/test-graph-bundle.ps1

      - name: Upload graph screenshots
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a   # v7.0.1
        with:
          name: graph-ui
          path: artifacts/ui/graph-*.png
          retention-days: 7

      - name: Publish win-x64 (self-contained, single file)
        run: dotnet publish src/App -c Release -r win-x64 --self-contained -p:PublishSingleFile=true -o artifacts/publish/win-x64

      # The web bundle must survive single-file publish as LOOSE files next to the
      # exe (ExcludeFromSingleFile, ADR-004 D6) - a silent drop would only surface
      # at app runtime.
      - name: Verify web bundle survives publish
        run: |
          $web = 'artifacts/publish/win-x64/web'
          foreach ($f in 'index.html', 'bridge.js', 'graph.js', 'vendor/cytoscape.min.js') {
            if (-not (Test-Path (Join-Path $web $f))) {
              Write-Host "MISSING from publish output: $web/$f"
              exit 1
            }
          }
          # Strongest possible integrity check: every published bundle file must be
          # byte-identical to its vendored source in the checkout (no magic-number
          # size floor - cytoscape.min.js 3.34.0 is ~425 KB and failed a 500KB one).
          foreach ($f in 'index.html', 'bridge.js', 'graph.js', 'vendor/cytoscape.min.js') {
            $published = (Get-FileHash (Join-Path $web $f) -Algorithm SHA256).Hash
            $source = (Get-FileHash (Join-Path 'src/App/web' $f) -Algorithm SHA256).Hash
            if ($published -ne $source) {
              Write-Host "CORRUPTED in publish output: $web/$f (hash $published != source $source)"
              exit 1
            }
          }
          Write-Host "web bundle intact: all 4 files byte-identical to src/App/web."

      - name: Upload release artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a   # v7.0.1
        with:
          name: groupweaver-win-x64
          path: artifacts/publish/win-x64
          retention-days: 7
