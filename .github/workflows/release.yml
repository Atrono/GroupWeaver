name: Release

on:
  push:
    tags: ['v*']

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false      # never cancel an in-flight release

permissions:
  contents: write                # create the Release + upload assets
  id-token: write                # OIDC token to sign the provenance
  attestations: write            # write the attestation to the repo

jobs:
  release:
    runs-on: windows-2022        # same hard pin as CI (issue #32); win-x64 self-contained publish needs Windows
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10   # v6.0.3

      - name: Setup .NET 8
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2   # v5.3.0
        with:
          global-json-file: global.json

      - name: Derive version from tag
        id: ver
        shell: pwsh
        run: |
          $v = '${{ github.ref_name }}' -replace '^v',''
          if ($v -notmatch '^\d+\.\d+\.\d+') { $v = "$v.0" }   # v0.1 -> 0.1.0
          "version=$v"                  | Out-File $env:GITHUB_OUTPUT -Append
          "tag=${{ github.ref_name }}"  | Out-File $env:GITHUB_OUTPUT -Append

      - name: Pack release zip + sha256 (+ launch smoke)
        id: pack
        shell: pwsh
        run: pwsh tools/pack-release.ps1 -Version '${{ steps.ver.outputs.version }}' -Emit github

      - name: Attest build provenance
        uses: actions/attest-build-provenance@977bb373ede98d70efdf65b84cb5f73e068dcc2a   # v3.0.0 (#79: v2.x wrapped actions/attest on the removed Node 20 runtime; v3 moved it to Node 24, same subject-path I/O)
        with:
          subject-path: ${{ steps.pack.outputs.zip }}

      - name: Create GitHub Release and upload assets
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create '${{ steps.ver.outputs.tag }}' `
            '${{ steps.pack.outputs.zip }}' `
            '${{ steps.pack.outputs.sha256 }}' `
            --title 'GroupWeaver ${{ steps.ver.outputs.tag }}' `
            --notes-file artifacts/release/RELEASE_NOTES.md
